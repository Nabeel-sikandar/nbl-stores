<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <!-- Dark background -->
  <rect width="400" height="140" rx="12" fill="#111111"/>
  
  <!-- NBL Letters - Bold, White -->
  <text x="20" y="88" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#FFFFFF" letter-spacing="12">NBL</text>
  
  <!-- Thin elegant line separator -->
  <line x1="232" y1="40" x2="232" y2="100" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- STORES text -->
  <text x="248" y="70" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="400" fill="#FFFFFF" letter-spacing="8">STORES</text>
  
  <!-- Tagline -->
  <text x="248" y="92" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9CA3AF" letter-spacing="4">PREMIUM FASHION</text>
</svg>