<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Background transparent -->
  
  <!-- NBL Letters - Bold, Premium, Spaced -->
  <text x="20" y="78" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#111111" letter-spacing="12">NBL</text>
  
  <!-- Thin elegant line separator -->
  <line x1="232" y1="30" x2="232" y2="90" stroke="#111111" stroke-width="1.5"/>
  
  <!-- STORES text - Light, Elegant -->
  <text x="248" y="60" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="400" fill="#111111" letter-spacing="8">STORES</text>
  
  <!-- Tagline -->
  <text x="248" y="82" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9CA3AF" letter-spacing="4">PREMIUM FASHION</text>
</svg>